definitions:
  dto.AdminRoleResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      permissions:
        items:
          type: string
        type: array
      updated_at:
        type: string
    type: object
  dto.AdminUserCreateRequest:
    properties:
      admin_role_id:
        type: integer
      email:
        maxLength: 255
        type: string
      name:
        maxLength: 255
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
      phone:
        maxLength: 255
        type: string
      username:
        maxLength: 255
        minLength: 3
        type: string
    required:
    - admin_role_id
    - email
    - name
    - password
    - phone
    - username
    type: object
  dto.ConfigResponse:
    properties:
      id:
        type: integer
      is_public:
        type: boolean
      key:
        type: string
      value:
        type: string
    type: object
  dto.ConfigUpdateRequest:
    properties:
      is_public:
        type: boolean
      value:
        type: string
    required:
    - value
    type: object
  dto.CreateAdminRoleRequest:
    properties:
      description:
        maxLength: 255
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      permissions:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - name
    - permissions
    type: object
  dto.LogResponse:
    properties:
      action:
        type: string
      admin_role:
        $ref: '#/definitions/dto.AdminRoleResponse'
      config:
        $ref: '#/definitions/dto.ConfigResponse'
      created_at:
        type: string
      entity_id:
        type: integer
      entity_type:
        type: string
      id:
        type: integer
      message:
        type: string
      target_user:
        $ref: '#/definitions/dto.UserResponse'
      user:
        allOf:
        - $ref: '#/definitions/dto.UserResponse'
        description: Relationships
      user_id:
        type: integer
    type: object
  dto.UpdateAdminRoleRequest:
    properties:
      description:
        maxLength: 255
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
      permissions:
        items:
          type: string
        type: array
    required:
    - permissions
    type: object
  dto.UserAssignAdminRoleRequest:
    properties:
      admin_role_id:
        type: integer
    required:
    - admin_role_id
    type: object
  dto.UserResponse:
    properties:
      admin_role:
        $ref: '#/definitions/dto.AdminRoleResponse'
      admin_role_id:
        type: integer
      business_name:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      phone:
        type: string
      role:
        type: string
      username:
        type: string
    type: object
  dto.UserUpdateRequest:
    properties:
      name:
        type: string
      role:
        enum:
        - user
        type: string
    type: object
  response.Meta:
    properties:
      facet: {}
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  response.Response:
    properties:
      data: {}
      error: {}
      message:
        type: string
      meta: {}
      status:
        type: boolean
    type: object
info:
  contact:
    email: tester@lezenda.com
    name: Lezenda
    url: https://github.com/PhantomX7
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
paths:
  /admin/admin-role:
    get:
      consumes:
      - application/json
      description: Get a paginated list of admin roles
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      - description: Filter by name
        in: query
        name: name
        type: string
      - description: Filter by active status
        in: query
        name: is_active
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.AdminRoleResponse'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: List admin roles
      tags:
      - admin-role
    post:
      consumes:
      - application/json
      description: Create a new admin role with permissions
      parameters:
      - description: Admin Role Create Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateAdminRoleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AdminRoleResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Create admin role
      tags:
      - admin-role
  /admin/admin-role/{id}:
    delete:
      consumes:
      - application/json
      description: Delete an admin role (cannot delete if users are assigned)
      parameters:
      - description: Admin Role ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Delete admin role
      tags:
      - admin-role
    get:
      consumes:
      - application/json
      description: Get an admin role's details including permissions
      parameters:
      - description: Admin Role ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AdminRoleResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Get admin role by ID
      tags:
      - admin-role
    put:
      consumes:
      - application/json
      description: Update an admin role's details and permissions
      parameters:
      - description: Admin Role ID
        in: path
        name: id
        required: true
        type: integer
      - description: Admin Role Update Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateAdminRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AdminRoleResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Update admin role
      tags:
      - admin-role
  /admin/admin-role/permissions:
    get:
      consumes:
      - application/json
      description: Get all available permissions grouped by resource
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  additionalProperties:
                    items:
                      type: string
                    type: array
                  type: object
              type: object
      summary: Get all permissions
      tags:
      - admin-role
  /admin/user/{id}/admin-role:
    post:
      consumes:
      - application/json
      description: Assign an admin role to a user (changes user role to admin)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Assign Admin Role Request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.UserAssignAdminRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Assign admin role
      tags:
      - user
  /config:
    get:
      consumes:
      - application/json
      description: Get a paginated list of configs
      parameters:
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      - description: Sort
        in: query
        name: sort
        type: string
      - description: Filter by key
        in: query
        name: key
        type: string
      - description: Filter by group
        in: query
        name: group
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.ConfigResponse'
                  type: array
                meta:
                  $ref: '#/definitions/response.Meta'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: List configs
      tags:
      - config
  /config/{id}:
    put:
      consumes:
      - application/json
      description: Update a config with the provided details
      parameters:
      - description: Config ID
        in: path
        name: id
        required: true
        type: integer
      - description: Config Update Request
        in: body
        name: config
        required: true
        schema:
          $ref: '#/definitions/dto.ConfigUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.ConfigResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Update a config
      tags:
      - config
  /config/key/{key}:
    get:
      consumes:
      - application/json
      description: Find a config with the provided key
      parameters:
      - description: Config Key
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.ConfigResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Find a config by key
      tags:
      - config
  /log/{id}:
    get:
      consumes:
      - application/json
      description: Find a log with the provided ID
      parameters:
      - description: Log ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.LogResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Find a log by ID
      tags:
      - log
  /public/config:
    get:
      consumes:
      - application/json
      description: Get a paginated list of publicly visible configs
      parameters:
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      - description: Sort
        in: query
        name: sort
        type: string
      - description: Filter by key
        in: query
        name: key
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.ConfigResponse'
                  type: array
                meta:
                  $ref: '#/definitions/response.Meta'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: List public configs
      tags:
      - config
  /public/config/key/{key}:
    get:
      consumes:
      - application/json
      description: Find a publicly visible config by key; private keys 404
      parameters:
      - description: Config Key
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.ConfigResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Find a public config by key
      tags:
      - config
  /user:
    post:
      consumes:
      - application/json
      description: Create a new admin account with an assigned admin role; the account
        must rotate its password on first login
      parameters:
      - description: Admin User Create Request
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/dto.AdminUserCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Create an admin user
      tags:
      - user
  /user/{id}:
    get:
      consumes:
      - application/json
      description: Find a user with the provided ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Find a user by ID
      tags:
      - user
    put:
      consumes:
      - application/json
      description: Update a user with the provided details
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: User Update Request
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/dto.UserUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Update a user
      tags:
      - user
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
