version: "2"

run:
  timeout: 5m
  concurrency: 4

linters:
  default: standard
  enable:
    - bodyclose
    - contextcheck
    - errorlint
    - gocritic
    - gosec
    - misspell
    - nilerr
    - noctx
    - revive
    - sqlclosecheck
    - unconvert
    - unparam

  settings:
    gosec:
      excludes:
        - G104
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-declaration
        - name: var-naming
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
        - name: unused-parameter
          disabled: true
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch

  exclusions:
    paths:
      - internal/generated
      - docs/docs.go
      - database/migrations
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - unparam
          - revive
      - path: cmd/generate/
        linters:
          - gosec
      - path: database/seeder/
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/PhantomX7/athleton
