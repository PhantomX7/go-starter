name: Build and Deploy to VPS

on:
  push:
    branches: [ main ]

permissions:
  contents: read

# One deploy at a time; queued pushes wait instead of interleaving tar
# extraction, migrations, and pm2 restarts on the same target directory.
concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  test:
    name: gate on tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Run tests
        run: go test ./... -count=1

  build-and-deploy:
    runs-on: ubuntu-latest
    # A commit with failing tests must never reach the VPS.
    needs: test
    env:
      # Directory on the VPS to deploy into. Point this at a NON-ROOT deploy
      # user's home (e.g. /home/deploy/athleton) and set the SSH_USER secret to
      # that user: running migrations and pm2 as root is unnecessary privilege.
      # Left at /root/athleton so existing deployments keep working until the
      # non-root user is provisioned.
      DEPLOY_DIR: /root/athleton
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Build project
        env:
          GOOS: linux
          GOARCH: amd64
        run: |
          go build -o bin/athleton cmd/main.go
          go build -o bin/seeder database/seeder/main.go

      - name: Prepare Deployment Files
        run: |
          # Zip the necessary files for the deployment
          tar -czf deploy.tar.gz bin/ Makefile database/ atlas.hcl

      - name: Copy to VPS via SCP
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: ${{ env.DEPLOY_DIR }}

      - name: Extract, Migrate and Restart PM2
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.DEPLOY_DIR }}

            # Extract the new build
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            source ~/.bashrc || source ~/.profile
            
            # Make bin executable
            chmod +x ./bin/athleton
            chmod +x ./bin/seeder
            
            # Apply database migrations
            # Assuming .env matches Makefile required vars
            # atlas.sum is committed and must match the migration files;
            # a checksum error here means the files were tampered with or
            # the sum was not regenerated after editing a migration.
            make migrate-up
            ./bin/seeder
            
            # Restart the app with PM2
            pm2 delete api || true
            pm2 start ./bin/athleton --name "api" --cwd "${{ env.DEPLOY_DIR }}" -i 1 --max-memory-restart 500M
            pm2 save
