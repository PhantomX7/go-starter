name: Test

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    name: go test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Run tests
        # -race backs the concurrency guarantees the libs advertise (casbin
        # client, audit writers); CI is the one place it always runs.
        run: go test ./... -count=1 -race
